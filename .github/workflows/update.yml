name: Update PokerStars tournaments

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Run updater
        run: npm run update

      - name: Debug files
        run: |
          echo "Root:"
          ls -la
          echo "Public:"
          ls -la public || true
          echo "tournaments.json exists?"
          test -f public/tournaments.json && echo "YES" || echo "NO"
          echo "Bytes:"
          wc -c public/tournaments.json || true
          echo "Preview:"
          head -c 400 public/tournaments.json || true
          echo ""

      - name: Commit changes
        run: |
          git config user.name "mtt-finder-bot"
          git config user.email "mtt-finder-bot@users.noreply.github.com"
          git add public/tournaments.json public/tournaments_it.json public/tournaments_eur.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tournaments.json"
          git push