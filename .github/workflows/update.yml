name: Update PokerStars tournaments

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci || npm install

      - run: npm run update

      - name: Commit changes
        run: |
          git config user.name "mtt-finder-bot"
          git config user.email "mtt-finder-bot@users.noreply.github.com"
          git add public/tournaments.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tournaments.json"
          git push