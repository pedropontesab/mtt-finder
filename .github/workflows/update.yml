name: Update PokerStars tournaments

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Run updater
        run: npm run update

      - name: Debug list files
        run: |
          echo "PWD:"
          pwd
          echo "Root files:"
          ls -la
          echo "Public folder:"
          ls -la public || true

      - name: Debug tournaments.json size + preview
        run: |
          test -f public/tournaments.json && echo "File exists" || (echo "File missing" && exit 1)
          echo "Bytes:"
          wc -c public/tournaments.json
          echo "Preview:"
          head -c 400 public/tournaments.json || true
          echo ""

      - name: Commit changes
        run: |
          git config user.name "mtt-finder-bot"
          git config user.email "mtt-finder-bot@users.noreply.github.com"
          git add public/tournaments.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tournaments.json"
          git push
